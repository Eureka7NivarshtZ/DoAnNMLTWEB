<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="Navbar">
    <a href="index.html">
      <img src="/image/download.png" class="logo" alt="logo">
    </a>
  </div>

  <div class="AuthPage">
    <div class="AuthCard">
      <h1>Welcome Back</h1>
      <p>Sign in to continue exploring GIFs</p>

      <form class="AuthForm">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Sign In</button>
      </form>

      <span>
        Don't have an account?
        <a href="signup.html">Sign Up</a>
      </span>
    </div>
  </div>

</body>
</html>
